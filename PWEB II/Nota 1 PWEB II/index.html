    <title>Explorador de Bandeiras do Mundo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flag-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .flag-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .flag-img {
            aspect-ratio: 3 / 2;
            object-fit: cover;
            border-bottom: 1px solid #f3f4f6;
        }
    </style>
</head>

    <header class="bg-white shadow-sm sticky top-0 z-10">

            <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-2">
                <span class="text-blue-600">🌍</span> Bandeiras do Mundo
            </h1>
            <div class="relative w-full md:w-96">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Pesquisar país ou código (ex: BR, Brasil)..." 
                    class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                >
                <div class="absolute left-3 top-2.5 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <div class="mb-6 flex justify-between items-center text-sm text-gray-500">
            <p id="counter">Carregando países...</p>
        </div>

        <div id="flags-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-gray-500">
            <span class="text-6xl mb-4">🔍</span>
            <p class="text-xl font-medium">Nenhum país encontrado para essa busca.</p>
        </div>
    </main>

            { code: "zm", name: "Zâmbia" }, { code: "zw", name: "Zimbábue" }
        ];

        const grid = document.getElementById('flags-grid');
        const searchInput = document.getElementById('search-input');
        const counter = document.getElementById('counter');
        const emptyState = document.getElementById('empty-state');

        const BASE_URL = 'https://cdn.jsdelivr.net/gh/hampusborgos/country-flags@main/svg/';

        function displayFlags(filter = '') {
            grid.innerHTML = '';
            const normalizedFilter = filter.toLowerCase().trim();
            
            const filteredCountries = countries.filter(c => 
                c.name.toLowerCase().includes(normalizedFilter) || 
                c.code.toLowerCase().includes(normalizedFilter)
            );

            if (filteredCountries.length === 0) {
                emptyState.classList.remove('hidden');
                counter.innerText = '0 países encontrados';
            } else {
                emptyState.classList.add('hidden');
                counter.innerText = `${filteredCountries.length} países encontrados`;
                
                filteredCountries.forEach(country => {
                    const card = document.createElement('div');
                    card.className = 'flag-card bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 flex flex-col cursor-pointer';
                    
                    card.innerHTML = `
                        <img 
                            src="${BASE_URL}${country.code}.svg" 
                            alt="Bandeira de ${country.name}" 
                            class="flag-img w-full bg-gray-100"
                            loading="lazy"
                            onerror="this.src='https://via.placeholder.com/300x200?text=Indisponível'"
                        >
                        <div class="p-4">
                            <h3 class="font-bold text-gray-800 text-sm truncate" title="${country.name}">${country.name}</h3>
                            <span class="text-xs font-mono text-gray-400 uppercase">${country.code}</span>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        console.log(`País selecionado: ${country.name} (${country.code})`);
                    };
                    
                    grid.appendChild(card);
                });
            }
        }

        let timeout = null;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                displayFlags(e.target.value);
            }, 300);
        });

        window.onload = () => {
            displayFlags();
        };
    </script>
